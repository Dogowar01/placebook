<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0D0F18">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Placebook">
  <title>Placebook</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">

  <!-- MapLibre GL -->
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Lora:ital,wght@0,600;1,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/main.css?v=37">
</head>
<body>
  <div id="app">

    <!-- Main content area -->
    <main id="screen-container"></main>

    <!-- Location detail (overlay panel) -->
    <div id="detail-panel" class="detail-panel hidden"></div>

    <!-- Bottom navigation -->
    <nav id="bottom-nav">
      <button class="nav-tab active" data-tab="map">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>
        <span>Map</span>
      </button>
      <button class="nav-tab" data-tab="timeline">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span>Timeline</span>
      </button>
      <button class="nav-tab" data-tab="trips">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg>
        <span>Trips</span>
      </button>
      <button class="nav-tab" data-tab="food">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>
        <span>Food</span>
      </button>
      <button class="nav-tab" data-tab="passport">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 2 3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        <span>Passport</span>
      </button>
    </nav>

    <!-- Add Location Modal -->
    <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true">
      <div class="modal-sheet">
        <div class="modal-header">
          <button class="modal-close" id="modal-close">âœ•</button>
          <div class="modal-header-center">
            <span class="modal-title">New Place</span>
            <div class="modal-dots" id="modal-dots"></div>
          </div>
          <div style="width:32px"></div>
        </div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-footer" id="modal-footer"></div>
      </div>
    </div>

  </div>

  <!-- MapLibre GL JS -->
  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>

  <!-- App modules (order matters) -->
  <script src="js/storage.js?v=37"></script>
  <script src="js/photodb.js?v=37"></script>
  <script src="js/themes.js?v=37"></script>
  <script src="js/utils.js?v=37"></script>
  <script src="js/modal.js?v=37"></script>
  <script src="js/trips.js?v=37"></script>
  <script src="js/share.js?v=37"></script>
  <script src="js/map.js?v=37"></script>
  <script src="js/location.js?v=37"></script>
  <script src="js/timeline.js?v=37"></script>
  <script src="js/food.js?v=37"></script>
  <script src="js/passport.js?v=37"></script>
  <script src="js/onboarding.js?v=37"></script>
  <script src="js/app.js?v=37"></script>
</body>
</html>
